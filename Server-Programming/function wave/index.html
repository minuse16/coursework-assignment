<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Function Wave</title>
</head>
<body>
    <p id="output"></p>

    <script>
        let input = prompt("กรุณาพิมพ์ข้อความ")
    
        if(input.length < 10) {
            alert("ความยาวตัวอักษรต้องไม่ต่ำกว่า 10 ตัวอักษร")
        }else if(input.includes(' ')) {
            alert("ห้ามมีเว้นวรรค")
        }else {
            let result = []
            for (let i = 0; i < input.length; i++) {
                let capstr = input.substring(0, i) + input.charAt(i).toUpperCase() + input.substring(i + 1)
                result.push(capstr)
            }
        console.log(result)
        document.getElementById("output").innerText = result
    }
    </script>
</body>
</html>
